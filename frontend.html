<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D3.js Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        svg {
            border: 1px solid #ccc;
        }
    </style>
</head>
<body>
    <h1>D3.js Visualization Interface</h1>

    <div id="controls">
        <h2>Node/Degree Control</h2>
        <label for="nodes">Number of Nodes:</label>
        <input type="number" id="nodes" value="10" min="1">
        <button id="update">Update Visualization</button>
    </div>

    <svg id="visualization" width="800" height="600"></svg>

    <script>
        const svg = d3.select("#visualization");
        
        const updateVisualization = () => {
            const numNodes = +document.getElementById("nodes").value;
            // Logic to fetch data from Flask API and render the graph
            fetch(`/api/visualize?nodes=${numNodes}`)
                .then(response => response.json())
                .then(data => {
                    // Clear previous visualization
                    svg.selectAll("*").remove();
                    
                    // Visualization logic using D3.js goes here
                    const nodes = data.nodes; // Example fetching from API
                    svg.selectAll("circle")
                        .data(nodes)
                        .enter()
                        .append("circle")
                        .attr("cx", (d, i) => (i + 1) * 50)
                        .attr("cy", 100)
                        .attr("r", 20)
                        .style("fill", "blue");
                });
        };

        document.getElementById("update").addEventListener("click", updateVisualization);
    </script>
</body>
</html>
